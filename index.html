<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Masuk</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="screen" id="screen">
  <div class="brand">
    <div class="brand-icon">&#9889;</div>
    <div class="brand-name">LUSS</div>
    <div class="brand-tagline">Level Up &amp; Stay Strong</div>
  </div>

  <div class="tab-switch">
    <button id="tabLogin" class="active">Login</button>
    <button id="tabSignup">Sign up</button>
  </div>

  <!-- LOGIN FORM -->
  <form id="loginForm">
    <p class="field-label">Email</p>
    <input class="field-input" type="email" id="loginEmail" placeholder="nama@email.com" required>

    <p class="field-label">Password</p>
    <div class="input-wrapper">
      <input class="field-input" type="password" id="loginPassword" placeholder="Masukkan password" required>
      <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Tampilkan password">&#128065;</button>
    </div>

    <p class="error-text" id="loginError"></p>

    <button class="btn-primary" type="submit" id="loginSubmit">Masuk</button>
  </form>

  <!-- SIGNUP FORM -->
  <form id="signupForm" style="display:none;">
    <p class="field-label">Nama lengkap</p>
    <input class="field-input" type="text" id="signupName" placeholder="Nama kamu" required>

    <p class="field-label">Email</p>
    <input class="field-input" type="email" id="signupEmail" placeholder="nama@email.com" required>

    <p class="field-label">Password</p>
    <div class="input-wrapper">
      <input class="field-input" type="password" id="signupPassword" placeholder="Minimal 6 karakter" minlength="6" required>
      <button type="button" class="toggle-password" data-target="signupPassword" aria-label="Tampilkan password">&#128065;</button>
    </div>

    <p class="error-text" id="signupError"></p>
    <p class="info-text" id="signupInfo"></p>

    <button class="btn-primary" type="submit" id="signupSubmit">Buat akun</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active');
    tabSignup.classList.remove('active');
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
  });

  tabSignup.addEventListener('click', () => {
    tabSignup.classList.add('active');
    tabLogin.classList.remove('active');
    signupForm.style.display = 'block';
    loginForm.style.display = 'none';
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('loginError');
    const submitBtn = document.getElementById('loginSubmit');
    errorEl.textContent = '';

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Memproses...';

    try {
      await signIn(email, password);
      window.location.href = 'home.html';
    } catch (err) {
      errorEl.textContent = terjemahkanError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Masuk';
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('signupError');
    const infoEl = document.getElementById('signupInfo');
    const submitBtn = document.getElementById('signupSubmit');
    errorEl.textContent = '';
    infoEl.textContent = '';

    const fullName = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Memproses...';

    try {
      await signUp(email, password, fullName);
      infoEl.textContent = 'Akun dibuat. Cek email kamu untuk konfirmasi, lalu login lewat tab Login.';
      signupForm.reset();
      submitBtn.disabled = false;
      submitBtn.textContent = 'Buat akun';
    } catch (err) {
      errorEl.textContent = terjemahkanError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Buat akun';
    }
  });

  function terjemahkanError(msg) {
    if (msg.includes('Invalid login credentials')) return 'Email atau password salah.';
    if (msg.includes('already registered')) return 'Email ini sudah terdaftar.';
    if (msg.includes('Password should be')) return 'Password minimal 6 karakter.';
    if (msg.includes('Email not confirmed')) return 'Email belum dikonfirmasi. Cek inbox kamu.';
    return msg;
  }

  // Kalau sudah login, langsung lempar ke home
  redirectIfLoggedIn();

  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.style.opacity = isHidden ? '1' : '0.55';
    });
  });
</script>
</body>
</html>
