<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Masuk</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="screen" id="screen">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-bolt" style="color:var(--bg);"></i></div>
    <div class="brand-name">LUSS</div>
    <div class="brand-tagline">Level Up &amp; Stay Strong</div>
  </div>

  <div class="tab-switch">
    <button id="tabLogin" class="active">Masuk</button>
    <button id="tabSignup">Daftar</button>
  </div>

  <!-- LOGIN FORM -->
  <form id="loginForm">
    <p class="field-label">Email</p>
    <input class="field-input" type="email" id="loginEmail" placeholder="nama@email.com" required>

    <p class="field-label">Kata sandi</p>
    <div class="input-wrapper">
      <input class="field-input" type="password" id="loginPassword" placeholder="Masukkan kata sandi" required>
      <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Tampilkan password"><i class="ti ti-eye"></i></button>
    </div>

    <p class="error-text" id="loginError"></p>

    <p style="text-align:right; margin:-6px 0 14px;">
      <a href="#" id="forgotPasswordLink" style="font-size:12px; color:var(--peach-light); text-decoration:none;">Lupa password?</a>
    </p>

    <button class="btn-primary" type="submit" id="loginSubmit">Masuk</button>
  </form>

  <!-- FORGOT PASSWORD FORM -->
  <form id="forgotForm" style="display:none;">
    <p style="font-size:12.5px; color:var(--text-secondary); margin:0 0 16px;">Masukkan email akunmu, nanti dikirim link buat bikin kata sandi baru.</p>

    <p class="field-label">Email</p>
    <input class="field-input" type="email" id="forgotEmail" placeholder="nama@email.com" required>

    <p class="error-text" id="forgotError"></p>
    <p class="info-text" id="forgotInfo"></p>

    <button class="btn-primary" type="submit" id="forgotSubmit">Kirim link reset</button>
    <p style="text-align:center; margin:14px 0 0;">
      <a href="#" id="backToLoginLink" style="font-size:12px; color:var(--text-secondary); text-decoration:none;">&#8592; Kembali ke halaman masuk</a>
    </p>
  </form>

  <!-- SIGNUP FORM -->
  <form id="signupForm" style="display:none;">
    <p class="field-label">Nama lengkap</p>
    <input class="field-input" type="text" id="signupName" placeholder="Nama kamu" required>

    <p class="field-label">Email</p>
    <input class="field-input" type="email" id="signupEmail" placeholder="nama@email.com" required>

    <p class="field-label">Kata sandi</p>
    <div class="input-wrapper">
      <input class="field-input" type="password" id="signupPassword" placeholder="Minimal 6 karakter" minlength="6" required>
      <button type="button" class="toggle-password" data-target="signupPassword" aria-label="Tampilkan password"><i class="ti ti-eye"></i></button>
    </div>

    <p class="error-text" id="signupError"></p>
    <p class="info-text" id="signupInfo"></p>

    <button class="btn-primary" type="submit" id="signupSubmit">Buat akun</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active');
    tabSignup.classList.remove('active');
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
  });

  tabSignup.addEventListener('click', () => {
    tabSignup.classList.add('active');
    tabLogin.classList.remove('active');
    signupForm.style.display = 'block';
    loginForm.style.display = 'none';
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('loginError');
    const submitBtn = document.getElementById('loginSubmit');
    errorEl.textContent = '';

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Memproses...';

    try {
      await signIn(email, password);
      window.location.href = 'home.html';
    } catch (err) {
      errorEl.textContent = terjemahkanError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Masuk';
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('signupError');
    const infoEl = document.getElementById('signupInfo');
    const submitBtn = document.getElementById('signupSubmit');
    errorEl.textContent = '';
    infoEl.textContent = '';

    const fullName = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Memproses...';

    try {
      await signUp(email, password, fullName);
      infoEl.textContent = 'Akun dibuat. Cek email kamu untuk konfirmasi, lalu masuk lewat tab Masuk.';
      signupForm.reset();
      submitBtn.disabled = false;
      submitBtn.textContent = 'Buat akun';
    } catch (err) {
      errorEl.textContent = terjemahkanError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Buat akun';
    }
  });

  function terjemahkanError(msg) {
    if (msg.includes('Invalid login credentials')) return 'Email atau kata sandi salah.';
    if (msg.includes('already registered')) return 'Email ini sudah terdaftar.';
    if (msg.includes('Password should be')) return 'Kata sandi minimal 6 karakter.';
    if (msg.includes('Email not confirmed')) return 'Email belum dikonfirmasi. Cek inbox kamu.';
    return msg;
  }

  // Kalau sudah login, langsung lempar ke home
  redirectIfLoggedIn();

  document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
    e.preventDefault();
    loginForm.style.display = 'none';
    document.getElementById('forgotForm').style.display = 'block';
    document.querySelector('.tab-switch').style.display = 'none';
  });

  document.getElementById('backToLoginLink').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('forgotForm').style.display = 'none';
    loginForm.style.display = 'block';
    document.querySelector('.tab-switch').style.display = 'flex';
  });

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('forgotError');
    const infoEl = document.getElementById('forgotInfo');
    const submitBtn = document.getElementById('forgotSubmit');
    errorEl.textContent = '';
    infoEl.textContent = '';

    const email = document.getElementById('forgotEmail').value.trim();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Mengirim...';

    try {
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname.replace('index.html', '') + 'reset-password.html'
      });
      if (error) throw error;
      infoEl.textContent = 'Link reset sudah dikirim. Cek email kamu (termasuk folder spam).';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Kirim link reset';
    } catch (err) {
      errorEl.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Kirim link reset';
    }
  });

  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const icon = btn.querySelector('i');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'ti ti-eye-off' : 'ti ti-eye';
    });
  });
</script>
</body>
</html>
