<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Dashboard</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="loading-screen" id="loadingScreen">Memuat...</div>

<div class="screen with-nav" id="screen" style="display:none;">
  <div class="top-bar" style="margin-bottom:22px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <a href="home.html" class="icon-btn"><i class="ti ti-arrow-left"></i></a>
      <div>
        <p style="margin:0; font-size:12px; color:var(--text-secondary);" id="greetingName">Halo</p>
        <p style="margin:2px 0 0; font-size:18px; font-weight:700;">Dashboard</p>
      </div>
    </div>
    <a href="profile.html" class="icon-btn" style="width:36px; height:36px; border-radius:50%;" id="avatarLink">
      <i class="ti ti-user"></i>
    </a>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:14px;">
    <div style="flex:1; background:var(--grad-accent); border-radius:18px; padding:16px;">
      <i class="ti ti-flame" style="font-size:20px; color:var(--bg);"></i>
      <p style="margin:10px 0 0; font-size:22px; font-weight:700; color:var(--bg);" id="streakValue">0</p>
      <p style="margin:1px 0 0; font-size:11px; color:rgba(18,18,18,0.65);">Hari streak</p>
    </div>
    <div style="flex:1; background:var(--card); border:0.5px solid var(--border); border-radius:18px; padding:16px;">
      <i class="ti ti-checkbox" style="font-size:20px; color:var(--peach-light);"></i>
      <p style="margin:10px 0 0; font-size:22px; font-weight:600;" id="weekPercentValue">0%</p>
      <p style="margin:1px 0 0; font-size:11px; color:var(--text-secondary);">Selesai minggu ini</p>
    </div>
  </div>

  <div style="background:var(--card); border:0.5px solid var(--border); border-radius:18px; padding:16px; margin-bottom:14px;">
    <div class="segmented" style="margin-bottom:14px;">
      <button type="button" class="active" data-view="daily">Harian</button>
      <button type="button" data-view="weekly">Mingguan</button>
      <button type="button" data-view="monthly">Bulanan</button>
    </div>
    <p style="margin:0 0 12px; font-size:11px; color:var(--text-secondary);" id="breakdownCaption">7 hari terakhir</p>
    <div id="breakdownChart" style="display:flex; align-items:flex-end; justify-content:space-between; height:80px; gap:4px;"></div>
  </div>

  <div style="background:var(--card); border:0.5px solid var(--border); border-radius:18px; padding:16px; margin-bottom:14px;">
    <p style="margin:0 0 12px; font-size:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;">Activity paling konsisten</p>
    <div id="topConsistent"></div>
  </div>

  <div style="background:var(--card); border:0.5px solid var(--border); border-radius:18px; padding:16px;">
    <p style="margin:0 0 12px; font-size:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;">Activity paling tidak konsisten</p>
    <div id="bottomConsistent"></div>
  </div>
</div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="ti ti-home-filled"></i><span>Home</span></a>
  <a href="daily-activity.html" class="nav-item"><i class="ti ti-calendar-check"></i><span>Activity</span></a>
  <a href="dashboard.html" class="nav-item active"><i class="ti ti-chart-bar"></i><span>Dashboard</span></a>
  <a href="profile.html" class="nav-item"><i class="ti ti-user"></i><span>Profil</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script src="activity-utils.js"></script>
<script>
  (async function init(){
    const auth = await requireAuth();
    if (!auth) return;
    const user = auth.session.user;
    const profile = auth.profile;

    document.getElementById('greetingName').textContent = `Halo, ${(profile.full_name || profile.username || '').split(' ')[0]}`;
    document.getElementById('avatarLink').innerHTML = profile.avatar_url
      ? `<img src="${profile.avatar_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`
      : `<i class="ti ti-user"></i>`;

    const today = new Date(); today.setHours(0,0,0,0);
    const windowStart = new Date(today); windowStart.setDate(windowStart.getDate() - 364);

    const { data: activities } = await supabaseClient
      .from('activities')
      .select('*')
      .eq('user_id', user.id)
      .eq('is_active', true);

    const { data: logs } = await supabaseClient
      .from('checklist_logs')
      .select('activity_id, log_date, is_done')
      .eq('user_id', user.id)
      .gte('log_date', formatDateKey(windowStart));

    const logsMap = buildLogsMap(logs);
    const acts = activities || [];

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('screen').style.display = 'block';

    if (acts.length === 0) {
      document.getElementById('breakdownChart').innerHTML = '<p class="empty-note" style="padding:10px 0;">Belum ada activity. Tambahkan dulu di Daily Activity.</p>';
      document.getElementById('topConsistent').innerHTML = '<p class="empty-note" style="padding:0;">-</p>';
      document.getElementById('bottomConsistent').innerHTML = '<p class="empty-note" style="padding:0;">-</p>';
      return;
    }

    // Streak
    document.getElementById('streakValue').textContent = computeStreak(acts, logsMap, today);

    // Progress minggu ini (dipakai buat kartu ringkasan atas, selalu 7 hari)
    const week = computeWeekProgress(acts, logsMap, today);
    document.getElementById('weekPercentValue').textContent = `${week.percent}%`;

    // ---- Breakdown chart (Harian / Mingguan / Bulanan) ----
    const captions = { daily: '7 hari terakhir', weekly: '4 minggu terakhir', monthly: '12 bulan terakhir' };

    function renderBreakdown(view){
      let data;
      if (view === 'daily') data = computeDailyBreakdown(acts, logsMap, today, 7);
      else if (view === 'weekly') data = computeWeeklyBreakdown(acts, logsMap, today, 4);
      else data = computeMonthlyBreakdown(acts, logsMap, today, 12);

      document.getElementById('breakdownCaption').textContent = captions[view];

      const chartEl = document.getElementById('breakdownChart');
      chartEl.innerHTML = '';
      data.forEach(item => {
        const barHeight = item.dueCount > 0 ? Math.max(6, Math.round((item.percent/100) * 66)) : 4;
        const col = document.createElement('div');
        col.style.cssText = 'flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:0;';
        col.innerHTML = `
          <div style="width:100%; height:${barHeight}px; background:${item.dueCount > 0 ? (item.isCurrent ? 'var(--grad-accent)' : 'var(--peach)') : 'var(--border)'}; border-radius:6px;" title="${item.percent}%"></div>
          <span style="font-size:${view==='monthly' ? '8.5px' : '10px'}; color:${item.isCurrent ? 'var(--peach-light)' : 'var(--text-faint)'}; white-space:nowrap;">${item.label}</span>
        `;
        chartEl.appendChild(col);
      });
    }

    renderBreakdown('daily');

    document.querySelectorAll('.segmented button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.segmented button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderBreakdown(btn.dataset.view);
      });
    });

    // Ranking activity
    const ranking = computeActivityRanking(acts, logsMap, today, 30);

    function renderRankingList(container, items){
      if (items.length === 0) {
        container.innerHTML = '<p class="empty-note" style="padding:0; text-align:left;">Belum cukup data.</p>';
        return;
      }
      container.innerHTML = items.map(r => `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <span style="width:8px; height:8px; border-radius:50%; background:var(--peach); flex-shrink:0;"></span>
          <span style="font-size:13.5px; flex:1;">${escapeHtml(r.activity.subject)}</span>
          <span style="font-size:12px; color:var(--peach-light);">${r.percent}%</span>
        </div>
      `).join('');
    }

    renderRankingList(document.getElementById('topConsistent'), ranking.slice(0, 2));
    renderRankingList(document.getElementById('bottomConsistent'), ranking.slice(-2).reverse());
  })();

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
