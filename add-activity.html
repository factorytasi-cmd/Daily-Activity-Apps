<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Tambah Aktivitas</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="loading-screen" id="loadingScreen">Memuat...</div>

<div class="screen with-nav" id="screen" style="display:none;">
  <div class="top-bar">
    <div style="display:flex; align-items:center; gap:10px;">
      <a href="activities-list.html" class="icon-btn"><i class="ti ti-arrow-left"></i></a>
      <span class="top-bar-title" id="pageTitle">Tambah aktivitas</span>
    </div>
  </div>

  <form id="activityForm">
    <p class="field-label">Nama aktivitas</p>
    <input class="field-input" type="text" id="subject" placeholder="Contoh: Olahraga pagi" required>

    <p class="field-label">Jam aktivitas</p>
    <input class="field-input" type="time" id="activityTime" required>

    <p class="field-label">Pengulangan</p>
    <div class="segmented" id="recurrenceSegmented">
      <button type="button" class="active" data-value="daily">Harian</button>
      <button type="button" data-value="weekly">Mingguan</button>
      <button type="button" data-value="monthly">Bulanan</button>
    </div>

    <!-- MINGGUAN -->
    <div id="weeklyBlock" style="display:none;">
      <p class="field-label">Pilih hari</p>
      <div class="day-chip-row" id="dayChipRow">
        <div class="day-chip" data-day="1">Sn</div>
        <div class="day-chip" data-day="2">Sl</div>
        <div class="day-chip" data-day="3">Rb</div>
        <div class="day-chip" data-day="4">Km</div>
        <div class="day-chip" data-day="5">Jm</div>
        <div class="day-chip" data-day="6">Sb</div>
        <div class="day-chip" data-day="7">Mg</div>
      </div>
    </div>

    <!-- BULANAN -->
    <div id="monthlyBlock" style="display:none;">
      <p class="field-label">Mode</p>
      <div class="segmented" id="monthlyModeSegmented">
        <button type="button" class="active" data-mmode="fixed_date">Tanggal tetap</button>
        <button type="button" data-mmode="pattern">Pola minggu</button>
      </div>

      <div id="fixedDateBlock">
        <p class="field-label">Tanggal (1-31)</p>
        <input class="field-input" type="number" id="monthlyDate" min="1" max="31" placeholder="Contoh: 15">
      </div>

      <div id="patternBlock" style="display:none;">
        <p class="field-label">Hari</p>
        <div class="day-chip-row" id="patternDayRow">
          <div class="day-chip" data-day="1">Sn</div>
          <div class="day-chip" data-day="2">Sl</div>
          <div class="day-chip" data-day="3">Rb</div>
          <div class="day-chip" data-day="4">Km</div>
          <div class="day-chip" data-day="5">Jm</div>
          <div class="day-chip" data-day="6">Sb</div>
          <div class="day-chip" data-day="7">Mg</div>
        </div>
        <p class="field-label">Minggu ke-</p>
        <div class="day-chip-row" id="occurrenceRow">
          <div class="day-chip" data-occ="1" style="width:auto; border-radius:10px; padding:0 12px;">1</div>
          <div class="day-chip" data-occ="2" style="width:auto; border-radius:10px; padding:0 12px;">2</div>
          <div class="day-chip" data-occ="3" style="width:auto; border-radius:10px; padding:0 12px;">3</div>
          <div class="day-chip" data-occ="4" style="width:auto; border-radius:10px; padding:0 12px;">4</div>
          <div class="day-chip" data-occ="5" style="width:auto; border-radius:10px; padding:0 12px;">5</div>
        </div>
      </div>
    </div>

    <p class="field-label" id="effectiveLabel">Mulai berlaku tanggal</p>
    <input class="field-input" type="date" id="effectiveDate" required>
    <p style="font-size:11.5px; color:var(--text-secondary); margin:-8px 0 14px;" id="effectiveHint">Riwayat sebelum tanggal ini tidak akan berubah.</p>

    <p class="error-text" id="formError"></p>

    <button class="btn-primary" type="submit" id="submitBtn">Simpan aktivitas</button>
  </form>
</div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="ti ti-home-filled"></i><span>Beranda</span></a>
  <a href="daily-activity.html" class="nav-item active"><i class="ti ti-calendar-check"></i><span>Aktivitas</span></a>
  <a href="dashboard.html" class="nav-item"><i class="ti ti-chart-bar"></i><span>Dashboard</span></a>
  <a href="profile.html" class="nav-item"><i class="ti ti-user"></i><span>Profil</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  let currentUser = null;
  let recurrenceType = 'daily';
  let monthlyMode = 'fixed_date';
  let selectedWeeklyDays = [];
  let selectedPatternDay = null;
  let selectedOccurrence = null;
  let editingActivity = null; // null = mode tambah, object = mode edit

  function todayKey(){
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  }

  (async function init(){
    const auth = await requireAuth();
    if (!auth) return;
    currentUser = auth.session.user;

    document.getElementById('effectiveDate').value = todayKey();
    document.getElementById('effectiveDate').min = todayKey();

    const params = new URLSearchParams(window.location.search);
    const editId = params.get('edit');

    if (editId) {
      const { data, error } = await supabaseClient
        .from('activities').select('*').eq('id', editId).eq('user_id', currentUser.id).single();

      if (!error && data) {
        editingActivity = data;
        document.getElementById('pageTitle').textContent = 'Edit aktivitas';
        document.getElementById('submitBtn').textContent = 'Simpan perubahan';
        document.getElementById('effectiveLabel').textContent = 'Berlaku mulai tanggal';
        document.getElementById('effectiveHint').textContent = 'Checklist sebelum tanggal ini tetap memakai data lama.';
        isikanFormDenganData(data);
      }
    }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
  })();

  function isikanFormDenganData(a){
    document.getElementById('subject').value = a.subject;
    document.getElementById('activityTime').value = a.activity_time.slice(0,5);

    recurrenceType = a.recurrence_type;
    document.querySelectorAll('#recurrenceSegmented button').forEach(b => {
      b.classList.toggle('active', b.dataset.value === recurrenceType);
    });
    document.getElementById('weeklyBlock').style.display = recurrenceType === 'weekly' ? 'block' : 'none';
    document.getElementById('monthlyBlock').style.display = recurrenceType === 'monthly' ? 'block' : 'none';

    if (a.recurrence_type === 'weekly') {
      selectedWeeklyDays = [...(a.weekly_days || [])];
      document.querySelectorAll('#dayChipRow .day-chip').forEach(chip => {
        chip.classList.toggle('selected', selectedWeeklyDays.includes(Number(chip.dataset.day)));
      });
    }

    if (a.recurrence_type === 'monthly') {
      monthlyMode = a.monthly_mode;
      document.querySelectorAll('#monthlyModeSegmented button').forEach(b => {
        b.classList.toggle('active', b.dataset.mmode === monthlyMode);
      });
      document.getElementById('fixedDateBlock').style.display = monthlyMode === 'fixed_date' ? 'block' : 'none';
      document.getElementById('patternBlock').style.display = monthlyMode === 'pattern' ? 'block' : 'none';

      if (monthlyMode === 'fixed_date') {
        document.getElementById('monthlyDate').value = a.monthly_date;
      } else {
        selectedPatternDay = a.monthly_pattern_weekday;
        selectedOccurrence = a.monthly_pattern_occurrence;
        document.querySelectorAll('#patternDayRow .day-chip').forEach(chip => {
          chip.classList.toggle('selected', Number(chip.dataset.day) === selectedPatternDay);
        });
        document.querySelectorAll('#occurrenceRow .day-chip').forEach(chip => {
          chip.classList.toggle('selected', Number(chip.dataset.occ) === selectedOccurrence);
        });
      }
    }
  }

  // Segmented: tipe pengulangan
  document.getElementById('recurrenceSegmented').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('recurrenceSegmented').querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      recurrenceType = btn.dataset.value;
      document.getElementById('weeklyBlock').style.display = recurrenceType === 'weekly' ? 'block' : 'none';
      document.getElementById('monthlyBlock').style.display = recurrenceType === 'monthly' ? 'block' : 'none';
    });
  });

  document.getElementById('dayChipRow').querySelectorAll('.day-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const day = Number(chip.dataset.day);
      chip.classList.toggle('selected');
      if (selectedWeeklyDays.includes(day)) {
        selectedWeeklyDays = selectedWeeklyDays.filter(d => d !== day);
      } else {
        selectedWeeklyDays.push(day);
      }
    });
  });

  document.getElementById('monthlyModeSegmented').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('monthlyModeSegmented').querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      monthlyMode = btn.dataset.mmode;
      document.getElementById('fixedDateBlock').style.display = monthlyMode === 'fixed_date' ? 'block' : 'none';
      document.getElementById('patternBlock').style.display = monthlyMode === 'pattern' ? 'block' : 'none';
    });
  });

  document.getElementById('patternDayRow').querySelectorAll('.day-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('patternDayRow').querySelectorAll('.day-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      selectedPatternDay = Number(chip.dataset.day);
    });
  });

  document.getElementById('occurrenceRow').querySelectorAll('.day-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('occurrenceRow').querySelectorAll('.day-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      selectedOccurrence = Number(chip.dataset.occ);
    });
  });

  document.getElementById('activityForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');
    errorEl.textContent = '';

    const subject = document.getElementById('subject').value.trim();
    const activityTime = document.getElementById('activityTime').value;
    const effectiveDate = document.getElementById('effectiveDate').value;

    const fieldsBaru = {
      subject,
      activity_time: activityTime,
      recurrence_type: recurrenceType,
      weekly_days: null,
      monthly_mode: null,
      monthly_date: null,
      monthly_pattern_weekday: null,
      monthly_pattern_occurrence: null
    };

    if (recurrenceType === 'weekly') {
      if (selectedWeeklyDays.length === 0) {
        errorEl.textContent = 'Pilih minimal satu hari untuk aktivitas mingguan.';
        return;
      }
      fieldsBaru.weekly_days = selectedWeeklyDays;
    }

    if (recurrenceType === 'monthly') {
      fieldsBaru.monthly_mode = monthlyMode;
      if (monthlyMode === 'fixed_date') {
        const dateVal = Number(document.getElementById('monthlyDate').value);
        if (!dateVal || dateVal < 1 || dateVal > 31) {
          errorEl.textContent = 'Isi tanggal yang valid (1-31).';
          return;
        }
        fieldsBaru.monthly_date = dateVal;
      } else {
        if (!selectedPatternDay || !selectedOccurrence) {
          errorEl.textContent = 'Pilih hari dan minggu ke berapa.';
          return;
        }
        fieldsBaru.monthly_pattern_weekday = selectedPatternDay;
        fieldsBaru.monthly_pattern_occurrence = selectedOccurrence;
      }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Menyimpan...';

    let error;

    if (!editingActivity) {
      // MODE TAMBAH
      fieldsBaru.user_id = currentUser.id;
      fieldsBaru.effective_from = effectiveDate;
      fieldsBaru.effective_until = null;
      ({ error } = await supabaseClient.from('activities').insert(fieldsBaru));

    } else if (effectiveDate <= editingActivity.effective_from) {
      // Belum ada riwayat sebelum tanggal ini, cukup timpa langsung
      ({ error } = await supabaseClient.from('activities').update(fieldsBaru).eq('id', editingActivity.id));

    } else {
      // Ada riwayat lama yang harus tetap dijaga: tutup versi lama, buat versi baru
      const sehariSebelum = new Date(effectiveDate);
      sehariSebelum.setDate(sehariSebelum.getDate() - 1);
      const sehariSebelumKey = `${sehariSebelum.getFullYear()}-${String(sehariSebelum.getMonth()+1).padStart(2,'0')}-${String(sehariSebelum.getDate()).padStart(2,'0')}`;

      const { error: closeError } = await supabaseClient
        .from('activities')
        .update({ effective_until: sehariSebelumKey })
        .eq('id', editingActivity.id);

      if (closeError) {
        error = closeError;
      } else {
        fieldsBaru.user_id = currentUser.id;
        fieldsBaru.effective_from = effectiveDate;
        fieldsBaru.effective_until = null;
        ({ error } = await supabaseClient.from('activities').insert(fieldsBaru));
      }
    }

    if (error) {
      errorEl.textContent = error.message;
      submitBtn.disabled = false;
      submitBtn.textContent = editingActivity ? 'Simpan perubahan' : 'Simpan aktivitas';
      return;
    }

    window.location.href = 'activities-list.html';
  });
</script>
</body>
</html>
