<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Aktivitas Harian</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="loading-screen" id="loadingScreen">Memuat...</div>

<div class="screen with-nav" id="screen" style="display:none;">
  <div class="top-bar">
    <div style="display:flex; align-items:center; gap:10px;">
      <a href="home.html" class="icon-btn"><i class="ti ti-arrow-left"></i></a>
      <span class="top-bar-title">Aktivitas harian</span>
    </div>
    <div class="top-bar-actions">
      <a href="activities-list.html" class="icon-btn" aria-label="Kelola aktivitas"><i class="ti ti-list"></i></a>
      <button class="icon-btn" id="calendarBtn" aria-label="Pilih tanggal"><i class="ti ti-calendar"></i></button>
    </div>
  </div>

  <input type="date" id="datePicker" style="position:absolute; opacity:0; pointer-events:none; width:1px; height:1px;">

  <div id="notifBanner" style="display:none; background:var(--card); border:0.5px solid var(--border); border-radius:16px; padding:14px; margin-bottom:16px; display:none; align-items:center; gap:12px;">
    <i class="ti ti-bell-ringing" style="font-size:20px; color:var(--peach);"></i>
    <div style="flex:1;">
      <p style="margin:0; font-size:13px; font-weight:600;">Nyalakan pengingat</p>
      <p style="margin:2px 0 0; font-size:11.5px; color:var(--text-secondary);">Dapat notifikasi 15 menit sebelum aktivitas</p>
    </div>
    <button id="enableNotifBtn" style="background:var(--peach); border:none; border-radius:10px; padding:8px 12px; font-size:12px; font-weight:600; color:var(--bg); cursor:pointer; white-space:nowrap;">Aktifkan</button>
  </div>

  <div class="date-nav">
    <button class="arrow" id="prevBtn">&#8249;</button>
    <div class="date-block">
      <div class="date-main" id="dateMain">-</div>
      <div class="date-sub" id="dateSub"></div>
    </div>
    <button class="arrow" id="nextBtn">&#8250;</button>
  </div>

  <div class="motto-box" id="mottoBox"></div>

  <div class="progress-mini" id="progressRow" style="display:none;">
    <div class="bar"><div class="fill" id="progressFill"></div></div>
    <span class="label" id="progressLabel">0/0 selesai</span>
  </div>

  <div id="listContainer"></div>
</div>

<div id="reasonSheetBackdrop" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:20;"></div>
<div id="reasonSheet" style="display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:400px; background:var(--card); border:0.5px solid var(--border); border-radius:20px 20px 0 0; padding:18px 22px 26px; z-index:21; box-sizing:border-box;">
  <div style="width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px;"></div>
  <p style="margin:0 0 4px; font-size:14px; font-weight:700;" id="sheetTitle">Kenapa aktivitas ini belum tercapai?</p>
  <p style="margin:0 0 14px; font-size:11.5px; color:var(--text-secondary);" id="sheetDate"></p>

  <div id="sheetChipRow" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;">
    <div class="reason-chip" data-reason="sibuk">Sibuk</div>
    <div class="reason-chip" data-reason="malas">Malas</div>
    <div class="reason-chip" data-reason="bepergian">Sedang bepergian</div>
    <div class="reason-chip" data-reason="sakit">Sakit</div>
    <div class="reason-chip" data-reason="lainnya">Lainnya</div>
  </div>

  <input type="text" class="field-input" id="sheetCustomInput" placeholder="Sebutkan alasannya" style="display:none;">
  <textarea class="field-input" id="sheetRemarkInput" rows="2" placeholder="Catatan (opsional)" style="resize:vertical; font-family:inherit;"></textarea>

  <p class="error-text" id="sheetError" style="margin-top:8px;"></p>

  <button class="btn-primary" id="sheetSaveBtn" style="margin-top:6px;">Simpan</button>
</div>

<a href="add-activity.html" class="fab" aria-label="Tambah aktivitas"><i class="ti ti-plus"></i></a>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="ti ti-home-filled"></i><span>Beranda</span></a>
  <a href="daily-activity.html" class="nav-item active"><i class="ti ti-calendar-check"></i><span>Aktivitas</span></a>
  <a href="dashboard.html" class="nav-item"><i class="ti ti-chart-bar"></i><span>Dashboard</span></a>
  <a href="profile.html" class="nav-item"><i class="ti ti-user"></i><span>Profil</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script src="activity-utils.js"></script>
<script src="push-notifications.js"></script>
<script>
  let currentUser = null;
  let currentDate = new Date();
  currentDate.setHours(0,0,0,0);
  let allActivities = [];

  (async function init(){
    const auth = await requireAuth();
    if (!auth) return;
    currentUser = auth.session.user;

    document.getElementById('mottoBox').textContent = auth.profile.motto
      ? `"${auth.profile.motto}"`
      : 'Kecil tapi konsisten, itu yang menang.';

    const { data, error } = await supabaseClient
      .from('activities')
      .select('*')
      .eq('user_id', currentUser.id);

    if (!error) allActivities = data;

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('screen').style.display = 'block';

    const pushEnabled = await isPushEnabled();
    if (!pushEnabled && Notification.permission !== 'denied') {
      document.getElementById('notifBanner').style.display = 'flex';
    }

    await renderChecklist();
  })();

  document.getElementById('enableNotifBtn').addEventListener('click', async () => {
    const btn = document.getElementById('enableNotifBtn');
    btn.textContent = 'Memproses...';
    try {
      await enablePushNotifications(currentUser.id);
      document.getElementById('notifBanner').style.display = 'none';
    } catch (err) {
      alert(err.message);
      btn.textContent = 'Aktifkan';
    }
  });

  async function renderChecklist(){
    document.getElementById('dateMain').textContent = formatDisplayDate(currentDate);
    document.getElementById('dateSub').textContent = isToday(currentDate) ? 'Hari ini' : '';

    const dueToday = allActivities
      .filter(a => isActivityDueOnDate(a, currentDate))
      .sort((a,b) => a.activity_time.localeCompare(b.activity_time));

    const listContainer = document.getElementById('listContainer');
    const progressRow = document.getElementById('progressRow');

    if (dueToday.length === 0) {
      progressRow.style.display = 'none';
      listContainer.innerHTML = `<div class="empty-note">Tidak ada aktivitas di tanggal ini.<br>Tekan tombol + untuk menambah.</div>`;
      return;
    }

    const dateKey = formatDateKey(currentDate);
    const activityIds = dueToday.map(a => a.id);

    const { data: logs } = await supabaseClient
      .from('checklist_logs')
      .select('activity_id, is_done')
      .eq('user_id', currentUser.id)
      .eq('log_date', dateKey)
      .in('activity_id', activityIds);

    const doneMap = {};
    (logs || []).forEach(l => { doneMap[l.activity_id] = l.is_done; });

    const { data: reflections } = await supabaseClient
      .from('activity_reflections')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('log_date', dateKey)
      .in('activity_id', activityIds);

    const reflectionMap = {};
    (reflections || []).forEach(r => { reflectionMap[r.activity_id] = r; });

    const doneCount = dueToday.filter(a => doneMap[a.id]).length;
    progressRow.style.display = 'flex';
    document.getElementById('progressFill').style.width = `${(doneCount / dueToday.length) * 100}%`;
    document.getElementById('progressLabel').textContent = `${doneCount}/${dueToday.length} selesai`;

    listContainer.innerHTML = '';
    dueToday.forEach(activity => {
      const isDone = !!doneMap[activity.id];
      const reflection = reflectionMap[activity.id];

      const row = document.createElement('div');
      row.className = 'checklist-item' + (isDone ? ' done' : '');

      let badgeHtml = '';
      if (!isDone) {
        badgeHtml = reflection
          ? `<div class="reason-badge" data-reason-btn="${activity.id}"><i class="ti ti-message-circle" style="font-size:12px; color:var(--danger);"></i><span style="font-size:10px; color:var(--danger); font-weight:600;">${escapeHtml(labelAlasan(reflection))}</span></div>`
          : `<div class="reason-icon-empty" data-reason-btn="${activity.id}"><i class="ti ti-message-circle" style="font-size:13px; color:var(--text-faint);"></i></div>`;
      }

      row.innerHTML = `
        <div class="check-circle ${isDone ? 'checked' : ''}" data-toggle="${activity.id}">${isDone ? '<i class="ti ti-check"></i>' : ''}</div>
        <div style="flex:1; min-width:0;">
          <p class="ci-title">${escapeHtml(activity.subject)}</p>
          <p class="ci-time">${activity.activity_time.slice(0,5)}</p>
        </div>
        ${badgeHtml}
      `;
      row.querySelector('[data-toggle]').addEventListener('click', () => toggleDone(activity.id, dateKey, !isDone));
      const badgeEl = row.querySelector('[data-reason-btn]');
      if (badgeEl) badgeEl.addEventListener('click', () => bukaSheetAlasan(activity, dateKey, reflection));

      listContainer.appendChild(row);
    });
  }

  function labelAlasan(r){
    const labelMap = { sibuk:'Sibuk', malas:'Malas', bepergian:'Bepergian', sakit:'Sakit', lainnya: r.reason_custom_label || 'Lainnya' };
    return labelMap[r.reason] || r.reason;
  }

  // ---- Bottom sheet alasan per-activity ----
  let sheetContext = null; // { activityId, dateKey }

  function bukaSheetAlasan(activity, dateKey, existing){
    sheetContext = { activityId: activity.id, dateKey };

    document.getElementById('sheetTitle').textContent = `Kenapa "${activity.subject}" belum tercapai?`;
    document.getElementById('sheetDate').textContent = formatDisplayDate(currentDate);
    document.getElementById('sheetError').textContent = '';

    document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('selected'));
    document.getElementById('sheetCustomInput').style.display = 'none';
    document.getElementById('sheetCustomInput').value = '';
    document.getElementById('sheetRemarkInput').value = '';

    if (existing) {
      const chip = document.querySelector(`.reason-chip[data-reason="${existing.reason}"]`);
      if (chip) chip.classList.add('selected');
      if (existing.reason === 'lainnya') {
        document.getElementById('sheetCustomInput').style.display = 'block';
        document.getElementById('sheetCustomInput').value = existing.reason_custom_label || '';
      }
      document.getElementById('sheetRemarkInput').value = existing.remark || '';
    }

    document.getElementById('reasonSheetBackdrop').style.display = 'block';
    document.getElementById('reasonSheet').style.display = 'block';
  }

  function tutupSheetAlasan(){
    document.getElementById('reasonSheetBackdrop').style.display = 'none';
    document.getElementById('reasonSheet').style.display = 'none';
    sheetContext = null;
  }

  document.getElementById('reasonSheetBackdrop').addEventListener('click', tutupSheetAlasan);

  document.querySelectorAll('.reason-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      document.getElementById('sheetCustomInput').style.display = chip.dataset.reason === 'lainnya' ? 'block' : 'none';
    });
  });

  document.getElementById('sheetSaveBtn').addEventListener('click', async () => {
    if (!sheetContext) return;
    const selected = document.querySelector('.reason-chip.selected');
    const errorEl = document.getElementById('sheetError');

    if (!selected) {
      errorEl.textContent = 'Pilih salah satu alasan dulu.';
      return;
    }

    const { error } = await supabaseClient.from('activity_reflections').upsert({
      user_id: currentUser.id,
      activity_id: sheetContext.activityId,
      log_date: sheetContext.dateKey,
      reason: selected.dataset.reason,
      reason_custom_label: selected.dataset.reason === 'lainnya' ? document.getElementById('sheetCustomInput').value.trim() : null,
      remark: document.getElementById('sheetRemarkInput').value.trim() || null,
      updated_at: new Date().toISOString()
    }, { onConflict: 'activity_id,log_date' });

    if (error) { errorEl.textContent = error.message; return; }

    tutupSheetAlasan();
    renderChecklist();
  });

  async function toggleDone(activityId, dateKey, newValue){
    await supabaseClient.from('checklist_logs').upsert({
      user_id: currentUser.id,
      activity_id: activityId,
      log_date: dateKey,
      is_done: newValue,
      completed_at: newValue ? new Date().toISOString() : null
    }, { onConflict: 'activity_id,log_date' });

    renderChecklist();
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() - 1);
    renderChecklist();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() + 1);
    renderChecklist();
  });

  const datePicker = document.getElementById('datePicker');
  document.getElementById('calendarBtn').addEventListener('click', () => {
    datePicker.value = formatDateKey(currentDate);
    datePicker.style.pointerEvents = 'auto';
    datePicker.showPicker ? datePicker.showPicker() : datePicker.click();
  });
  datePicker.addEventListener('change', () => {
    if (datePicker.value) {
      const [y,m,d] = datePicker.value.split('-').map(Number);
      currentDate = new Date(y, m-1, d);
      renderChecklist();
    }
  });
</script>
</body>
</html>
