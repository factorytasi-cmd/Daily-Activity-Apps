<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Home</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="loading-screen" id="loadingScreen">Memuat...</div>

<div class="screen" id="screen" style="display:none;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:28px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:34px; height:34px; border-radius:10px; background:var(--peach); display:flex; align-items:center; justify-content:center;">
        <i class="ti ti-bolt" style="font-size:18px; color:var(--bg);"></i>
      </div>
      <span style="font-size:19px; font-weight:600; letter-spacing:0.5px;">LUSS</span>
    </div>
    <div style="width:34px; height:34px; border-radius:50%; background:var(--card-alt); display:flex; align-items:center; justify-content:center; font-size:15px;" id="avatarInitial">?</div>
  </div>

  <div style="margin-bottom:26px;">
    <p style="margin:0; font-size:12px; color:var(--text-secondary); letter-spacing:1px; text-transform:uppercase;">Selamat datang balik</p>
    <p style="margin:4px 0 0; font-size:24px; font-weight:600; line-height:1.25;" id="greeting">Halo!</p>
  </div>

  <a href="daily-activity.html" class="menu-card">
    <div class="menu-icon" style="background:var(--peach);">
      <i class="ti ti-calendar-check" style="color:var(--bg);"></i>
    </div>
    <div>
      <p class="menu-title">Daily activity</p>
      <p class="menu-desc">Catat &amp; pantau rutinitas harianmu</p>
    </div>
  </a>

  <a href="coming-soon.html?fitur=Project+Improvement" class="menu-card">
    <div class="menu-icon" style="background:var(--peach-light);">
      <i class="ti ti-rocket" style="color:var(--bg);"></i>
    </div>
    <div>
      <p class="menu-title">Project improvement</p>
      <p class="menu-desc">Kelola progres &amp; target proyekmu</p>
    </div>
  </a>

  <a href="coming-soon.html?fitur=Dashboard" class="menu-card">
    <div class="menu-icon" style="background:#F5A889;">
      <i class="ti ti-chart-bar" style="color:var(--bg);"></i>
    </div>
    <div>
      <p class="menu-title">Dashboard</p>
      <p class="menu-desc">Lihat ringkasan performamu</p>
    </div>
  </a>

  <div style="margin-top:30px; text-align:center;">
    <button class="btn-outline-danger" id="logoutBtn" style="width:auto; padding:10px 20px;">
      <i class="ti ti-logout"></i> Keluar
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  (async function init(){
    const auth = await requireAuth();
    if (!auth) return;

    const { profile } = auth;
    const name = profile.full_name || profile.username || 'kamu';
    document.getElementById('greeting').textContent = `Level up harimu, ${name.split(' ')[0]}. \u2728`;
    document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
  })();

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut();
  });
</script>
</body>
</html>
