<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Beranda</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="loading-screen" id="loadingScreen">Memuat...</div>

<div class="screen with-nav" id="screen" style="display:none;">

  <div class="app-header">
    <div class="logo-row">
      <div class="logo-badge"><i class="ti ti-bolt" style="font-size:17px; color:var(--bg);"></i></div>
      <div>
        <p class="logo-name">LUSS</p>
        <p class="logo-tagline">LEVEL UP &amp; STAY STRONG</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="icon-btn" style="cursor:default;"><i class="ti ti-bell"></i></div>
      <a href="profile.html" class="icon-btn" style="width:32px; height:32px; border-radius:50%; overflow:hidden;" id="avatarInitial">?</a>
    </div>
  </div>

  <p style="margin:0; font-size:11px; font-weight:700; color:var(--lavender-light); letter-spacing:1px; text-transform:uppercase;">Ayo Bertumbuh Bersama</p>

  <div class="motto-box" id="mottoBox" style="margin:10px 0;"></div>

  <p style="margin:2px 0 24px; font-size:22px; font-weight:800; line-height:1.3;" id="greeting">Tingkatkan dirimu <span>&#9889;</span></p>

  <a href="daily-activity.html" class="menu-card">
    <div class="menu-icon" style="background:linear-gradient(135deg, var(--peach), #FF9D6E);">
      <i class="ti ti-calendar-check" style="color:var(--bg);"></i>
    </div>
    <div>
      <p class="menu-title">Aktivitas harian</p>
      <p class="menu-desc">Catat &amp; pantau rutinitas harianmu</p>
    </div>
  </a>

  <a href="coming-soon.html?fitur=Peningkatan+Proyek" class="menu-card">
    <div class="menu-icon" style="background:linear-gradient(135deg, var(--lavender-light), var(--lavender));">
      <i class="ti ti-rocket" style="color:var(--bg);"></i>
    </div>
    <div>
      <p class="menu-title">Peningkatan proyek</p>
      <p class="menu-desc">Kelola progres &amp; target proyekmu</p>
    </div>
  </a>

  <a href="dashboard.html" class="menu-card">
    <div class="menu-icon" style="background:linear-gradient(135deg, var(--coral), #E88B66);">
      <i class="ti ti-chart-bar" style="color:var(--bg);"></i>
    </div>
    <div>
      <p class="menu-title">Dashboard</p>
      <p class="menu-desc">Lihat ringkasan performamu</p>
    </div>
  </a>

</div>

<div class="bottom-nav" id="bottomNav" style="display:none;">
  <a href="home.html" class="nav-item active"><i class="ti ti-home-filled"></i><span>Beranda</span></a>
  <a href="daily-activity.html" class="nav-item"><i class="ti ti-calendar-check"></i><span>Aktivitas</span></a>
  <a href="dashboard.html" class="nav-item"><i class="ti ti-chart-bar"></i><span>Dashboard</span></a>
  <a href="profile.html" class="nav-item"><i class="ti ti-user"></i><span>Profil</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  (async function init(){
    const auth = await requireAuth();
    if (!auth) return;

    const { profile } = auth;
    const name = profile.full_name || profile.username || 'kamu';
    const firstName = name.split(' ')[0];

    document.getElementById('mottoBox').textContent = profile.motto
      ? `"${profile.motto}"`
      : '"Kecil tapi konsisten, itu yang menang."';

    document.getElementById('greeting').innerHTML = `Tingkatkan dirimu, ${escapeHtml(firstName)} <span>&#9889;</span>`;

    const avatarEl = document.getElementById('avatarInitial');
    if (profile.avatar_url) {
      avatarEl.innerHTML = `<img src="${profile.avatar_url}" style="width:100%; height:100%; object-fit:cover;">`;
    } else {
      avatarEl.textContent = firstName.charAt(0).toUpperCase();
    }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    document.getElementById('bottomNav').style.display = 'flex';
  })();

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
