<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSS — Reset Password</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="screen" id="screen">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-bolt" style="color:var(--bg);"></i></div>
    <div class="brand-name">LUSS</div>
    <div class="brand-tagline">Buat password baru</div>
  </div>

  <div id="checkingBox" style="text-align:center; color:var(--text-secondary); font-size:13px; padding:20px 0;">
    Memverifikasi link...
  </div>

  <form id="resetForm" style="display:none;">
    <p class="field-label">Password baru</p>
    <div class="input-wrapper">
      <input class="field-input" type="password" id="newPassword" placeholder="Minimal 6 karakter" minlength="6" required>
      <button type="button" class="toggle-password" data-target="newPassword" aria-label="Tampilkan password"><i class="ti ti-eye"></i></button>
    </div>

    <p class="field-label">Ulangi password baru</p>
    <div class="input-wrapper">
      <input class="field-input" type="password" id="confirmPassword" placeholder="Ketik ulang password" minlength="6" required>
      <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Tampilkan password"><i class="ti ti-eye"></i></button>
    </div>

    <p class="error-text" id="resetError"></p>

    <button class="btn-primary" type="submit" id="resetSubmit">Simpan password baru</button>
  </form>

  <div id="invalidBox" style="display:none; text-align:center; color:var(--danger); font-size:13px; padding:10px 0;">
    Link ini sudah tidak valid atau kedaluwarsa. Silakan minta link reset baru dari halaman login.
    <p style="margin-top:14px;"><a href="index.html" style="color:var(--peach-light); font-size:13px;">&#8592; Kembali ke login</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  (async function init(){
    // supabase-js otomatis membaca token dari URL (dikirim lewat link email)
    const { data: { session } } = await supabaseClient.auth.getSession();

    document.getElementById('checkingBox').style.display = 'none';

    if (!session) {
      document.getElementById('invalidBox').style.display = 'block';
      return;
    }

    document.getElementById('resetForm').style.display = 'block';
  })();

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('resetError');
    const submitBtn = document.getElementById('resetSubmit');
    errorEl.textContent = '';

    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword.length < 6) { errorEl.textContent = 'Password minimal 6 karakter.'; return; }
    if (newPassword !== confirmPassword) { errorEl.textContent = 'Password tidak sama.'; return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Menyimpan...';

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    if (error) {
      errorEl.textContent = error.message;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Simpan password baru';
      return;
    }

    alert('Password berhasil diubah. Silakan login dengan password baru.');
    await supabaseClient.auth.signOut();
    window.location.href = 'index.html';
  });

  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const icon = btn.querySelector('i');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'ti ti-eye-off' : 'ti ti-eye';
    });
  });
</script>
</body>
</html>
